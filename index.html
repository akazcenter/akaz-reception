<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة مكافآت الاستقبال - مركز عكاز</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Tahoma,sans-serif;
  background:#f4f6f9;
  direction:rtl;
  color:#1f2937;
}
.container{
  max-width:430px;
  margin:35px auto;
  background:#fff;
  padding:28px 22px;
  border-radius:22px;
  box-shadow:0 12px 35px rgba(0,0,0,.08);
}
.logo{
  width:260px;
  max-width:100%;
  display:block;
  margin:0 auto 24px;
  border-radius:12px;
}
h1{
  margin:0;
  text-align:center;
  color:#1f3a5f;
  font-size:28px;
}
.subtitle{
  text-align:center;
  color:#666;
  margin:14px 0 26px;
  font-size:16px;
  line-height:1.7;
}
input{
  width:100%;
  height:56px;
  padding:12px 16px;
  margin-bottom:13px;
  border:1px solid #d7dce2;
  border-radius:12px;
  font-size:18px;
  text-align:right;
  outline:none;
}
input:focus{
  border-color:#1f3a5f;
  box-shadow:0 0 0 3px rgba(31,58,95,.12);
}
button{
  width:100%;
  height:58px;
  border:0;
  border-radius:12px;
  background:#1f3a5f;
  color:white;
  font-size:20px;
  cursor:pointer;
  margin-top:5px;
}
.result{
  margin-top:20px;
  padding:18px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  line-height:1.9;
  min-height:70px;
}
.green{background:#edf8ef;color:#166534;}
.red{background:#fff1f2;color:#991b1b;}
.blue{background:#eef5ff;color:#1f3a5f;}
.small{
  font-size:14px;
  color:#6b7280;
  text-align:center;
  margin-top:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="مركز عكاز">

<h1>حاسبة مكافآت الاستقبال</h1>
<div class="subtitle">يتم احتساب المكافأة من تاريخ 21 إلى 20 من كل شهر</div>

<input type="number" id="income" placeholder="دخل الاستقبال خلال الفترة">

<button onclick="calc()">احسبي المكافأة</button>

<div id="output" class="result blue">—</div>

<div class="small">المكافأة تبدأ عند تحقيق 50,000 ريال، وكل 10,000 ريال إضافية تزيد المكافأة 100 ريال</div>

</div>

<script>
function calc(){

  let income = Number(document.getElementById('income').value);
  let output = document.getElementById('output');

  if(!income && income !== 0){
    output.className = "result red";
    output.innerHTML = "اكتبي الدخل أولاً";
    return;
  }

  let bonus = 0;
  let msg = "";

  if(income < 50000){
    let remaining = 50000 - income;
    msg = "باقي لك " + remaining.toLocaleString() + " ريال وتحققين أول مكافأة";
    output.className = "result red";
  } 
  else if(income < 60000){
    bonus = 500;
    let remaining = 60000 - income;
    msg = "ما شاء الله، دخلتي أول مكافأة، باقي لك " + remaining.toLocaleString() + " ريال وتزيد مكافأتك 100 ريال";
    output.className = "result blue";
  }
  else{
    let extra = Math.floor((income - 50000) / 10000);
    bonus = 500 + (extra * 100);

    let nextTarget = Math.ceil(income / 10000) * 10000 + 10000;
    let remaining = nextTarget - income;

    msg = "ما شاء الله، مستمرة على أداء عالي، باقي لك " + remaining.toLocaleString() + " ريال لزيادة 100 ريال إضافية";
    output.className = "result green";
  }

  output.innerHTML =
    msg +
    "<br><br><b>مكافأتك: " + bonus.toLocaleString() + " ريال</b>";

}
</script>

</body>
</html>
